<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieSatBD - Premium Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: 'Roboto', 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        header { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; background: rgba(17,17,17,0.95); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #222; backdrop-filter: blur(8px); }
        .logo { font-size: 1.2rem; font-weight: 700; color: #e50914; text-shadow: 0 0 10px rgba(229,9,20,0.5); }
        
        /* Search & Filter UI */
        .search-box input { padding: 8px 15px; border-radius: 20px; border: 1px solid #333; background: #111; color: #fff; outline: none; width: 140px; font-size: 0.8rem; }
        .filter-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-top: 5px; scrollbar-width: none; }
        .filter-btn { background: #222; color: #aaa; border: 1px solid #333; padding: 5px 12px; border-radius: 15px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: #e50914; color: #fff; border-color: #e50914; }

        /* Banner */
        .swiper { width: 100%; height: 250px; margin-top: 55px; }
        .swiper-slide { position: relative; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        .banner-info { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 4px; border-left: 3px solid #e50914; font-size: 0.7rem; font-weight: bold; }

        /* Movie Grid & Skeleton Loader */
        .container { max-width: 1200px; margin: 15px auto; padding: 0 10px; }
        .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .movie-card { background: #111; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #222; transition: 0.3s; }
        .poster-box { height: 160px; position: relative; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Views & Tags UI */
        .view-count { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); color: #00ffcc; font-size: 9px; padding: 2px 6px; border-radius: 4px; display: flex; align-items: center; gap: 3px; }
        .trending-badge { position: absolute; top: 5px; left: 5px; background: linear-gradient(45deg, #ff416c, #ff4b2b); color: #fff; font-size: 8px; padding: 2px 6px; border-radius: 3px; font-weight: bold; z-index: 5; animation: glow 1.5s infinite; }
        @keyframes glow { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .info { padding: 8px 5px; text-align: center; font-size: 0.75rem; font-weight: 500; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Skeleton Animation */
        .skeleton { background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%); background-size: 200% 100%; animation: loading 1.5s infinite; height: 160px; border-radius: 8px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        @media (max-width: 600px) { .swiper { height: 180px; } .movie-grid { gap: 6px; } }
    </style>
</head>
<body>
<header>
    <div class="logo">MovieSatBD</div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="খুঁজুন..." oninput="searchMovie()"></div>
</header>

<div class="swiper mySwiper">
    <div class="swiper-wrapper" id="sliderWrapper"></div>
    <div class="swiper-pagination"></div>
</div>

<div class="container">
    <div class="filter-container">
        <div class="filter-btn active" onclick="filterBy('All', this)">All</div>
        <div class="filter-btn" onclick="filterBy('Movie', this)">Movies</div>
        <div class="filter-btn" onclick="filterBy('TV Series', this)">Series</div>
        <div class="filter-btn" onclick="filterBy('Bangla', this)">Bangla</div>
        <div class="filter-btn" onclick="filterBy('Hindi', this)">Hindi</div>
    </div>

    <div class="movie-grid" id="movieGrid">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const DB_URL = "https://moviesatbd-default-rtdb.firebaseio.com/movies.json";
    let allMovies = [];

    async function fetchData() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(!data) return;
            allMovies = Object.keys(data).map(key => ({ fbId: key, ...data[key] })).reverse();
            
            renderSlider(allMovies.filter(m => !m.download_url || m.download_url === "#").slice(0, 5));
            renderMovies(allMovies);
        } catch (e) { console.error(e); }
    }

    function renderSlider(movies) {
        const slider = document.getElementById('sliderWrapper');
        slider.innerHTML = "";
        movies.forEach(m => {
            slider.innerHTML += `
                <div class="swiper-slide" onclick="window.location.href='movie.html?id=${m.fbId}'">
                    <img src="${m.poster}" alt="${m.title}">
                    <div class="banner-info">COMING SOON: ${m.title}</div>
                </div>`;
        });
        new Swiper(".mySwiper", { loop: true, autoplay: { delay: 4000 }, pagination: { el: ".swiper-pagination", clickable: true } });
    }

    function renderMovies(movies) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = "";
        movies.forEach(m => {
            const isTrending = (m.views > 7000) ? '<span class="trending-badge">🔥 Trending</span>' : '';
            // Fake View Logic: Displaying the saved view + some logic
            const displayViews = m.views ? (m.views / 1000).toFixed(1) + 'k' : '5.2k';

            grid.innerHTML += `
                <div class="movie-card" onclick="window.location.href='movie.html?id=${m.fbId}'">
                    ${isTrending}
                    <div class="poster-box">
                        <img src="${m.poster}">
                        <div class="view-count">👁️ ${displayViews}</div>
                    </div>
                    <div class="info">${m.title}</div>
                </div>`;
        });
    }

    function filterBy(type, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if(type === 'All') { renderMovies(allMovies); return; }
        
        const filtered = allMovies.filter(m => 
            (m.type === type) || (m.language === type)
        );
        renderMovies(filtered);
    }

    function searchMovie() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderMovies(allMovies.filter(m => m.title.toLowerCase().includes(term)));
    }

    fetchData();
</script>
</body>
</html>
