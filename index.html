<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieSatBD Official - Premium Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: 'Roboto', 'Hind Siliguri', sans-serif; }
        header { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; background: rgba(17,17,17,0.95); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #222; backdrop-filter: blur(5px); }
        .logo { font-size: 1.2rem; font-weight: 700; color: #e50914; }
        .search-box input { padding: 6px 15px; border-radius: 20px; border: 1px solid #444; background: #000; color: #fff; outline: none; width: 130px; }
        
        /* Swiper / Banner Premium Style */
        .swiper { width: 100%; height: 250px; margin-top: 55px; position: relative; }
        .swiper-slide { position: relative; cursor: pointer; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
        .banner-watermark { position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.6); color: #fff; font-size: 0.6rem; padding: 3px 6px; border-radius: 4px; border: 1px solid #e50914; font-weight: bold; letter-spacing: 1px; }
        .banner-info-premium { position: absolute; bottom: 10px; left: 10px; z-index: 10; color: #e50914; font-size: 0.7rem; font-weight: bold; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 2px; }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 10px; }
        .section-title { font-size: 1rem; margin-bottom: 15px; color: #eee; border-left: 3px solid #e50914; padding-left: 8px; }
        
        /* Movie Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .movie-card { background: #111; border-radius: 6px; overflow: hidden; position: relative; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .movie-card:hover { transform: translateY(-3px); border-color: #e50914; }
        .poster-box { height: 150px; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Tags */
        .lang-tag { position: absolute; top: 5px; right: 5px; background: #333; font-size: 8px; padding: 2px 5px; border-radius: 3px; font-weight: bold; text-transform: uppercase; z-index: 5; }
        .coming-soon-tag { position: absolute; top: 5px; left: 5px; background: #e50914; color: #fff; font-size: 8px; padding: 2px 5px; border-radius: 3px; font-weight: bold; text-transform: uppercase; z-index: 5; }
        
        .info { padding: 5px; text-align: center; font-size: 0.7rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #eee; }
        .site-footer { margin-top: 40px; padding: 20px; text-align: center; border-top: 1px solid #222; font-size: 0.6rem; color: #444; line-height: 1.4; }
        @media (max-width: 600px) { .swiper { height: 180px; } }
    </style>
</head>
<body>
<header><div class="logo">MovieSatBD</div><div class="search-box"><input type="text" id="searchInput" placeholder="খুঁজুন..." oninput="searchMovie()"></div></header>

<div class="swiper mySwiper">
    <div class="swiper-wrapper" id="sliderWrapper"></div>
    <div class="swiper-pagination"></div>
</div>

<div class="container">
    <h2 class="section-title">Latest Releases</h2>
    <div class="movie-grid" id="movieGrid"><p id="loading" style="grid-column: 1/-1; text-align:center;">লোড হচ্ছে...</p></div>
</div>

<footer class="site-footer">
    <p>MovieSatBD does not host any copyrighted contents. All data is fetched via public APIs for educational purposes only. If you believe your copyrighted work is being used improperly, please contact us for formal review.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const DB_URL = "https://moviesatbd-default-rtdb.firebaseio.com/movies.json";
    let allMovies = [];

    async function fetchData() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(!data) return;
            allMovies = Object.keys(data).map(key => ({ fbId: key, ...data[key] })).reverse();
            
            // স্লাইডারে শুধু Coming Soon মুভিগুলো (যেগুলোর download_url নেই বা #)
            const csMovies = allMovies.filter(m => !m.download_url || m.download_url === "#");
            renderSlider(csMovies.length > 0 ? csMovies : allMovies.slice(0, 5));
            renderMovies(allMovies);
        } catch (e) { console.error(e); }
    }

    function renderSlider(movies) {
        const slider = document.getElementById('sliderWrapper');
        slider.innerHTML = "";
        movies.forEach(m => {
            const isCS = !m.download_url || m.download_url === "#";
            slider.innerHTML += `
                <div class="swiper-slide" onclick="window.location.href='movie.html?id=${m.fbId}'">
                    <div class="banner-watermark">MOVIE SAT BD</div>
                    <img src="${m.poster}" alt="${m.title}">
                    <div class="banner-info-premium">ULTRA HD | ${isCS ? 'COMING SOON' : 'WATCH NOW'}</div>
                </div>`;
        });
        new Swiper(".mySwiper", { loop: true, autoplay: { delay: 4000 }, pagination: { el: ".swiper-pagination", clickable: true } });
    }

    function renderMovies(movies) {
        const grid = document.getElementById('movieGrid');
        if(document.getElementById('loading')) document.getElementById('loading').style.display = 'none';
        grid.innerHTML = "";
        movies.forEach(m => {
            const isCS = !m.download_url || m.download_url === "#";
            grid.innerHTML += `
                <div class="movie-card" onclick="window.location.href='movie.html?id=${m.fbId}'">
                    ${isCS ? '<span class="coming-soon-tag">Coming Soon</span>' : ''}
                    <span class="lang-tag">${m.language || 'Bangla'}</span>
                    <div class="poster-box"><img src="${m.poster}"></div>
                    <div class="info">${m.title}</div>
                </div>`;
        });
    }

    function searchMovie() {
        const term = document.getElementById('searchInput').value.toLowerCase().trim();
        const filtered = allMovies.filter(m => m.title.toLowerCase().includes(term));
        renderMovies(filtered);
    }
    fetchData();
</script>
</body>
</html>
