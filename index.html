<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieSatBD - Premium Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        /* --- Base Styles --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: 'Roboto', 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        
        header { 
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: rgba(17,17,17,0.95); 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 1000; 
            border-bottom: 1px solid #222; 
            backdrop-filter: blur(8px); 
        }
        .logo { font-size: 1.2rem; font-weight: 700; color: #e50914; text-shadow: 0 0 10px rgba(229,9,20,0.5); }
        
        /* --- Search & Filters --- */
        .search-box input { padding: 8px 15px; border-radius: 20px; border: 1px solid #333; background: #111; color: #fff; outline: none; width: 140px; font-size: 0.8rem; }
        .filter-container { display: flex; gap: 8px; overflow-x: auto; padding: 15px 10px; margin-top: 55px; scrollbar-width: none; }
        .filter-container::-webkit-scrollbar { display: none; }
        .filter-btn { background: #1a1a1a; color: #aaa; border: 1px solid #333; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .filter-btn.active { background: #e50914; color: #fff; border-color: #e50914; box-shadow: 0 0 10px rgba(229,9,20,0.3); }

        /* --- Swiper Banner --- */
        .swiper { width: 100%; height: 220px; margin-bottom: 10px; }
        .swiper-slide { position: relative; cursor: pointer; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 0 0 15px 15px; }
        .banner-info { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 4px; border-left: 4px solid #e50914; font-size: 0.75rem; font-weight: bold; color: #ffc107; }

        /* --- Movie Grid --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 10px 50px; }
        .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .movie-card { background: #111; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #222; transition: transform 0.2s; }
        .movie-card:active { transform: scale(0.96); }
        
        .poster-box { height: 165px; position: relative; overflow: hidden; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* --- Tags & Badges --- */
        .lang-tag { position: absolute; top: 6px; right: 6px; background: rgba(229, 9, 20, 0.9); color: #fff; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: bold; z-index: 5; }
        .view-count { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.7); color: #00ffcc; font-size: 9px; padding: 2px 6px; border-radius: 4px; display: flex; align-items: center; gap: 3px; font-weight: bold; }
        .trending-badge { position: absolute; top: 6px; left: 6px; background: linear-gradient(45deg, #ff416c, #ff4b2b); color: #fff; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: bold; z-index: 5; animation: glow 1.5s infinite; }
        .coming-soon-badge { position: absolute; top: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.8); color: #ffc107; font-size: 9px; text-align: center; padding: 4px 0; z-index: 10; font-weight: bold; border-bottom: 1px solid #ffc107; text-transform: uppercase; }

        @keyframes glow { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .info { padding: 10px 5px; text-align: center; font-size: 0.8rem; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Skeleton --- */
        .skeleton { background: #1a1a1a; height: 165px; border-radius: 10px; animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        @media (max-width: 600px) { 
            .swiper { height: 190px; } 
            .movie-grid { gap: 8px; }
            .poster-box { height: 150px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">MovieSatBD</div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="খুঁজুন..." oninput="searchMovie()"></div>
</header>

<div class="filter-container">
    <div class="filter-btn active" onclick="filterBy('All', this)">All</div>
    <div class="filter-btn" onclick="filterBy('Movie', this)">Movies</div>
    <div class="filter-btn" onclick="filterBy('TV Series', this)">Series</div>
    <div class="filter-btn" onclick="filterBy('Bangla', this)">Bangla</div>
    <div class="filter-btn" onclick="filterBy('Hindi', this)">Hindi</div>
    <div class="filter-btn" onclick="filterBy('Tamil', this)">Tamil</div>
    <div class="filter-btn" onclick="filterBy('English', this)">English</div>
</div>

<div class="swiper mySwiper">
    <div class="swiper-wrapper" id="sliderWrapper"></div>
    <div class="swiper-pagination"></div>
</div>

<div class="container">
    <div class="movie-grid" id="movieGrid">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const DB_URL = "https://moviesatbd-default-rtdb.firebaseio.com/movies.json";
    let allMovies = [];

    async function fetchData() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if(!data) {
                document.getElementById('movieGrid').innerHTML = "<p style='text-align:center; width:100%;'>কোনো মুভি পাওয়া যায়নি!</p>";
                return;
            }
            allMovies = Object.keys(data).map(key => ({ fbId: key, ...data[key] })).reverse();
            
            // স্লাইডারে শুধু সেই মুভিগুলো দেখাবে যেগুলোর লিঙ্ক নেই (Coming Soon)
            const comingSoonMovies = allMovies.filter(m => !m.download_url || m.download_url === "" || m.download_url === "skip").slice(0, 5);
            renderSlider(comingSoonMovies);
            renderMovies(allMovies);
        } catch (e) { 
            console.error("Fetch Error:", e); 
        }
    }

    function renderSlider(movies) {
        const slider = document.getElementById('sliderWrapper');
        slider.innerHTML = "";
        if(movies.length === 0) {
            document.querySelector('.mySwiper').style.display = 'none';
            return;
        }
        movies.forEach(m => {
            slider.innerHTML += `
                <div class="swiper-slide" onclick="window.location.href='movie.html?id=${m.fbId}'">
                    <img src="${m.poster}" alt="${m.title}">
                    <div class="banner-info">COMING SOON: ${m.title}</div>
                </div>`;
        });
        new Swiper(".mySwiper", { loop: true, autoplay: { delay: 4000 }, pagination: { el: ".swiper-pagination", clickable: true } });
    }

    function renderMovies(movies) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = "";
        movies.forEach(m => {
            // ১. ট্রেন্ডিং ব্যাজ (৭০০০ এর বেশি ভিউ হলে)
            const isTrending = (m.views > 7000) ? '<span class="trending-badge">🔥 Trending</span>' : '';
            
            // ২. কামিং সুন ব্যাজ (লিঙ্ক না থাকলে)
            const isComingSoon = (!m.download_url || m.download_url === "" || m.download_url === "skip") 
                ? '<div class="coming-soon-badge">Coming Soon</div>' 
                : '';
            
            // ৩. ল্যাঙ্গুয়েজ ট্যাগ
            const langLabel = m.language ? m.language.replace('_', ' ') : 'N/A';
            const langTag = `<div class="lang-tag">${langLabel}</div>`;

            // ৪. ভিউ ফরম্যাট (যেমন: 5200 -> 5.2k)
            const displayViews = m.views >= 1000 ? (m.views / 1000).toFixed(1) + 'k' : (m.views || 0);

            grid.innerHTML += `
                <div class="movie-card" onclick="window.location.href='movie.html?id=${m.fbId}'">
                    ${isComingSoon}
                    ${isTrending}
                    <div class="poster-box">
                        <img src="${m.poster}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x220?text=No+Poster'">
                        ${langTag}
                        <div class="view-count">👁️ ${displayViews}</div>
                    </div>
                    <div class="info">${m.title}</div>
                </div>`;
        });
    }

    function filterBy(type, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        if(type === 'All') { 
            renderMovies(allMovies); 
        } else {
            const filtered = allMovies.filter(m => 
                (m.type === type) || (m.language === type)
            );
            renderMovies(filtered);
        }
    }

    function searchMovie() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allMovies.filter(m => m.title.toLowerCase().includes(term));
        renderMovies(filtered);
    }

    // অ্যাপ শুরু
    fetchData();
</script>
</body>
</html>
